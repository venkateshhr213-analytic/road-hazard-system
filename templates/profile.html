<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Profile</title>

<style>

/* PAGE */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
}

/* SLIDE PANEL BACKGROUND */
.profile-panel{
    position:fixed;
    top:0;
    right:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    display:flex;
    justify-content:flex-end;
}

/* PROFILE BOX */
.profile-box{
    background:white;
    width:360px;
    height:100%;
    padding:30px;
    box-shadow:-5px 0 25px rgba(0,0,0,0.2);
    animation:slideIn .35s ease;
}

/* TITLE */
.profile-box h2{
    margin-top:0;
}

/* USER IMAGE */
.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    background:#0d6efd;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    margin:auto;
    margin-bottom:20px;
}

/* INFO */
.info{
    margin:12px 0;
    font-size:16px;
}

/* BUTTON */
.logout-btn{
    display:block;
    text-align:center;
    background:#dc3545;
    color:white;
    padding:12px;
    border-radius:6px;
    text-decoration:none;
    margin-top:30px;
}

.logout-btn:hover{
    background:#bb2d3b;
}

/* CLOSE BUTTON */
.close-btn{
    float:right;
    font-size:22px;
    cursor:pointer;
    color:#888;
}

.close-btn:hover{
    color:black;
}

/* ANIMATION */
@keyframes slideIn{
    from{ transform:translateX(100%); }
    to{ transform:translateX(0); }
}

</style>
</head>

<body>

<div class="profile-panel">

    <div class="profile-box">

        <div class="close-btn" onclick="window.location.href='{{ url_for('dashboard') }}'">
            ✖
        </div>

        <h2>👤 User Profile</h2>

        <!-- avatar letter -->
        <div class="avatar">
            {{ name[0] if name else "U" }}
        </div>

        <div class="info"><b>Name:</b> {{ name }}</div>
        <div class="info"><b>Email:</b> {{ email }}</div>

        <a href="{{ url_for('logout') }}" class="logout-btn">
            Logout
        </a>

    </div>

</div>

</body>
</html>
